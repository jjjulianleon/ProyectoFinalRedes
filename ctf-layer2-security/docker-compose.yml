###############################################################################
# CTF Layer 2 Security - Docker Compose
# Red Team vs Blue Team: ARP Spoofing & MAC Flooding
# Red bridge personalizada: 172.20.0.0/24
###############################################################################

services:

  # =========================================================================
  # GATEWAY/ROUTER - Simula el punto de salida de la red corporativa
  # Habilita IP forwarding para reenviar paquetes entre hosts
  # =========================================================================
  gateway:
    build: ./containers/gateway
    container_name: gateway
    hostname: gateway
    cap_add:
      - NET_ADMIN        # Necesario para configurar interfaces y rutas
    sysctls:
      - net.ipv4.ip_forward=1   # Habilita reenvio de paquetes (actua como router)
    networks:
      ctf-network:
        ipv4_address: 172.20.0.2
    restart: unless-stopped

  # =========================================================================
  # VICTIMS - Hosts con servicios vulnerables y flags ocultas
  # Cada victim corre un servicio HTTP basico (se configuran en Fase 2)
  # =========================================================================
  victim1:
    build:
      context: ./containers/victim
      args:
        VICTIM_ID: "1"
    container_name: victim1
    hostname: victim1
    environment:
      - VICTIM_ID=1
      - FLAG=${FLAG1}
    networks:
      ctf-network:
        ipv4_address: 172.20.0.10
    depends_on:
      - gateway
    restart: unless-stopped

  victim2:
    build:
      context: ./containers/victim
      args:
        VICTIM_ID: "2"
    container_name: victim2
    hostname: victim2
    environment:
      - VICTIM_ID=2
      - FLAG=${FLAG2}
    networks:
      ctf-network:
        ipv4_address: 172.20.0.11
    depends_on:
      - gateway
    restart: unless-stopped

  victim3:
    build:
      context: ./containers/victim
      args:
        VICTIM_ID: "3"
    container_name: victim3
    hostname: victim3
    environment:
      - VICTIM_ID=3
      - FLAG=${FLAG3}
      - GATEWAY_IP=172.20.0.2
    networks:
      ctf-network:
        ipv4_address: 172.20.0.12
    depends_on:
      - gateway
    restart: unless-stopped

  # =========================================================================
  # RED TEAM - Contenedor del atacante
  # Equipado con Scapy, tcpdump y scripts ofensivos
  # Necesita NET_ADMIN y NET_RAW para manipular paquetes a nivel de Capa 2
  # =========================================================================
  redteam:
    build: ./containers/redteam
    container_name: redteam
    hostname: redteam
    stdin_open: true       # Mantiene el contenedor corriendo (modo interactivo)
    tty: true
    cap_add:
      - NET_ADMIN          # Modificar interfaces, tablas ARP, rutas
      - NET_RAW            # Enviar/recibir paquetes raw (Scapy necesita esto)
    sysctls:
      - net.ipv4.ip_forward=1   # Necesario para MITM (reenviar paquetes interceptados)
    networks:
      ctf-network:
        ipv4_address: 172.20.0.100
    depends_on:
      - gateway
      - victim1
      - victim2
      - victim3
    restart: unless-stopped

  # =========================================================================
  # BLUE TEAM - Contenedor del defensor
  # Equipado con Scapy, herramientas de analisis y acceso a dashboards
  # =========================================================================
  blueteam:
    build: ./containers/blueteam
    container_name: blueteam
    hostname: blueteam
    stdin_open: true
    tty: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      ctf-network:
        ipv4_address: 172.20.0.200
    depends_on:
      - gateway
      - victim1
      - victim2
      - victim3
    restart: unless-stopped

  # =========================================================================
  # CTFd - Plataforma de gestion de la competencia CTF
  # Gestiona challenges, flags, scoring y tablero en tiempo real
  # Usa MariaDB como base de datos para persistencia
  # Accesible via navegador en http://172.20.0.250:8000
  # =========================================================================
  ctfd:
    image: ctfd/ctfd:latest
    container_name: ctfd
    hostname: ctfd
    environment:
      - DATABASE_URL=mysql+pymysql://ctfd:ctfd_password@ctfd-db/ctfd
      - REDIS_URL=redis://ctfd-cache:6379
      - WORKERS=1
      - LOG_FOLDER=/var/log/CTFd
      - ACCESS_LOG=-
      - ERROR_LOG=-
    ports:
      - "8000:8000"          # Accesible desde el host en localhost:8000
    networks:
      ctf-network:
        ipv4_address: 172.20.0.250
    depends_on:
      ctfd-db:
        condition: service_healthy
      ctfd-cache:
        condition: service_healthy
    restart: unless-stopped

  # Base de datos para CTFd
  ctfd-db:
    image: mariadb:10.11
    container_name: ctfd-db
    hostname: ctfd-db
    environment:
      - MYSQL_ROOT_PASSWORD=ctfd_root_password
      - MYSQL_USER=ctfd
      - MYSQL_PASSWORD=ctfd_password
      - MYSQL_DATABASE=ctfd
    volumes:
      - ctfd-db-data:/var/lib/mysql
    networks:
      ctf-network:
        ipv4_address: 172.20.0.251
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Cache Redis para CTFd
  ctfd-cache:
    image: redis:7-alpine
    container_name: ctfd-cache
    hostname: ctfd-cache
    networks:
      ctf-network:
        ipv4_address: 172.20.0.252
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =========================================================================
  # WAZUH INDEXER - Motor de busqueda (OpenSearch) para almacenar alertas
  # Configuracion basada en el deployment oficial de Wazuh Docker 4.9.2
  # =========================================================================
  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.9.2
    container_name: wazuh-indexer
    hostname: wazuh.indexer
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
      - ./containers/wazuh/config/wazuh_indexer/opensearch.yml:/usr/share/wazuh-indexer/opensearch.yml
      - ./containers/wazuh/config/wazuh_indexer/internal_users.yml:/usr/share/wazuh-indexer/opensearch-security/internal_users.yml
      - ./containers/wazuh/certs/root-ca.pem:/usr/share/wazuh-indexer/certs/root-ca.pem:ro
      - ./containers/wazuh/certs/wazuh.indexer.pem:/usr/share/wazuh-indexer/certs/wazuh.indexer.pem:ro
      - ./containers/wazuh/certs/wazuh.indexer-key.pem:/usr/share/wazuh-indexer/certs/wazuh.indexer.key:ro
      - ./containers/wazuh/certs/admin.pem:/usr/share/wazuh-indexer/certs/admin.pem:ro
      - ./containers/wazuh/certs/admin-key.pem:/usr/share/wazuh-indexer/certs/admin-key.pem:ro
    networks:
      ctf-network:
        ipv4_address: 172.20.0.241
    restart: unless-stopped

  # =========================================================================
  # WAZUH MANAGER - Servidor central que recibe logs de agentes
  # Procesa reglas, genera alertas, gestiona agentes via puerto 1514/1515
  # =========================================================================
  wazuh-manager:
    image: wazuh/wazuh-manager:4.9.2
    container_name: wazuh-manager
    hostname: wazuh.manager
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - FILEBEAT_SSL_VERIFICATION_MODE=none
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/filebeat.pem
      - SSL_KEY=/etc/ssl/filebeat.key
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 655360
        hard: 655360
    volumes:
      - ./containers/wazuh/certs/root-ca.pem:/etc/ssl/root-ca.pem:ro
      - ./containers/wazuh/certs/wazuh.manager.pem:/etc/ssl/filebeat.pem:ro
      - ./containers/wazuh/certs/wazuh.manager-key.pem:/etc/ssl/filebeat.key:ro
    networks:
      ctf-network:
        ipv4_address: 172.20.0.240
    depends_on:
      - wazuh-indexer
    restart: unless-stopped

  # =========================================================================
  # WAZUH DASHBOARD - Interfaz web para visualizar alertas y eventos
  # Accesible via navegador en https://localhost:5601
  # Credenciales: admin / SecretPassword
  # =========================================================================
  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.9.2
    container_name: wazuh-dashboard
    hostname: wazuh.dashboard
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - WAZUH_API_URL=https://wazuh.manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=kibanaserver
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    volumes:
      - ./containers/wazuh/config/wazuh_dashboard/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml
      - ./containers/wazuh/certs/wazuh.dashboard.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard.pem:ro
      - ./containers/wazuh/certs/wazuh.dashboard-key.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard-key.pem:ro
      - ./containers/wazuh/certs/root-ca.pem:/usr/share/wazuh-dashboard/certs/root-ca.pem:ro
      - wazuh-dashboard-config:/usr/share/wazuh-dashboard/data/wazuh/config
      - wazuh-dashboard-custom:/usr/share/wazuh-dashboard/plugins/wazuh/public/assets/custom
    ports:
      - "5601:5601"
    networks:
      ctf-network:
        ipv4_address: 172.20.0.242
    depends_on:
      - wazuh-indexer
      - wazuh-manager
    restart: unless-stopped

  # =========================================================================
  # SURICATA - Motor NIDS en modo promiscuo
  # Inspecciona todo el trafico de la red bridge para detectar
  # patrones de ARP Spoofing y MAC Flooding a nivel de Capa 2
  # =========================================================================
  suricata:
    build: ./containers/suricata
    container_name: suricata
    hostname: suricata
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE            # Necesario para AF_PACKET
    networks:
      ctf-network:
        ipv4_address: 172.20.0.230
    volumes:
      - suricata-logs:/var/log/suricata
    depends_on:
      - gateway
    restart: unless-stopped

# =============================================================================
# VOLUMES - Persistencia de datos
# =============================================================================
volumes:
  ctfd-db-data:
  wazuh-indexer-data:
  wazuh-dashboard-config:
  wazuh-dashboard-custom:
  suricata-logs:

# =============================================================================
# RED DOCKER BRIDGE PERSONALIZADA
# Simula una LAN conmutada donde todos los hosts estan en el mismo segmento L2
# El driver "bridge" crea un switch virtual en el kernel de Linux
# =============================================================================
networks:
  ctf-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
          gateway: 172.20.0.1
