<!--
  Wazuh Agent - ossec.conf (redteam)
  Placeholders MANAGER_IP y AGENT_NAME son reemplazados por sed en entrypoint.sh
-->
<ossec_config>

  <client>
    <server>
      <address>MANAGER_IP</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <enrollment>
      <enabled>yes</enabled>
      <agent_name>AGENT_NAME</agent_name>
    </enrollment>
  </client>

  <!-- File Integrity Monitoring: detecta cambios en flags y archivos criticos -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>60</frequency>
    <scan_on_start>yes</scan_on_start>
    <directories realtime="yes" report_changes="yes">/flags</directories>
    <directories realtime="yes" report_changes="yes">/files</directories>
    <directories check_all="yes">/etc/hosts</directories>
    <directories check_all="yes">/etc/resolv.conf</directories>
  </syscheck>

  <!-- ARP table snapshot: detecta cambios en entradas ARP -->
  <localfile>
    <log_format>command</log_format>
    <command>arp -n</command>
    <alias>arp-table-check</alias>
    <frequency>15</frequency>
  </localfile>

  <!-- Conteo de entradas ARP con categorizacion: picos indican MAC flooding.
       Script clasifica: ARP_NORMAL (<20), MAC_FLOOD_WARNING (20-99), MAC_FLOOD_CRITICAL (100+) -->
  <localfile>
    <log_format>command</log_format>
    <command>/usr/local/bin/arp-count-status.sh</command>
    <alias>arp-entry-count</alias>
    <frequency>15</frequency>
  </localfile>

  <!-- MAC del gateway: cambio indica ARP spoofing activo
       Script /usr/local/bin/gw-mac-check.sh compara con baseline local:
       - MAC_BASELINE: primera lectura
       - MAC_STABLE:   sin cambios
       - MAC_CHANGED:  la MAC cambio (= MITM activo) -->
  <localfile>
    <log_format>command</log_format>
    <command>/usr/local/bin/gw-mac-check.sh</command>
    <alias>gateway-mac-check</alias>
    <frequency>10</frequency>
  </localfile>

</ossec_config>
